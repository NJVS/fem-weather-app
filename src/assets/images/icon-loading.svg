<svg
    width="60"
    height="20"
    viewBox="0 0 120 30"
    xmlns="http://www.w3.org/2000/svg"
    fill="#fff"
>
    <circle cx="30" cy="15" r="8">
        <animate
            attributeName="cy"
            values="15;5;15"
            dur="0.6s"
            repeatCount="indefinite"
        />
    </circle>

    <circle cx="60" cy="15" r="8">
        <animate
            attributeName="cy"
            values="15;5;15"
            dur="0.6s"
            begin="0.1s"
            repeatCount="indefinite"
        />
    </circle>

    <circle cx="90" cy="15" r="8">
        <animate
            attributeName="cy"
            values="15;5;15"
            dur="0.6s"
            begin="0.2s"
            repeatCount="indefinite"
        />
    </circle>
</svg>